name: TruckLog
options:
  bundleIdPrefix: com.chrisdrive
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"

targets:
  TruckLog:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - TruckLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrisdrive.trucklog
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        DEVELOPMENT_TEAM: 49D2THWCHV
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: TruckLog/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "TruckLog App Store"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TruckLog/Info.plist
      properties:
        CFBundleName: TruckLog
        CFBundleDisplayName: TruckLog
        CFBundleVersion: "4"
        CFBundleShortVersionString: "1.0.0"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIApplicationSupportsIndirectInputEvents: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
